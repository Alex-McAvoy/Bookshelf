<body>
    <!-- 在读 -->
    <div class="bookCollection media-所有介质" id="readingBooks">

    </div>

</body>
<script>
    $(function(){
        $.get("./resources/markdown/books.md", function(md){
            // 解析书籍信息
            let BOOKS = parseMarkdownTable(md);
            let read = BOOKS.read;
            let reading = BOOKS.reading;
            let bought = BOOKS.bought;
            let suspended = BOOKS.suspended;
            let purchase = BOOKS.purchase;

            // 更新数量
            $("#readingCount").text(reading.length);

            // 渲染在读书籍
            // $("#readingBooks").append(renderBookList(reading));
        });
    });
</script>
