<script>
    $(function () {
        // 读取书籍数据
        $.get("./resources/markdown/books.md", function (md) {
            // 解析书籍信息
            var BOOKS = parseMarkdownTable(md);
            window.BOOK_COLLECTIONS = {
                readingBooks: BOOKS.reading,
                boughtBooks: BOOKS.bought,
                suspendedBooks: BOOKS.suspended,
                readingHistory: BOOKS.read,
                purchaseBooks: BOOKS.purchase
            };

            // 渲染在读
            $("#readingCount").text(BOOKS.reading.length);
            $("#readingBookList").html(
                renderBookList(BOOKS.reading, {
                    showComment: false,
                    showRating: false,
                    showReadDate: false
                })
            );

            // 渲染读过
            $("#readCount").text(BOOKS.read.length);
            $("#readBookList").html(
                renderBookList(BOOKS.read, {
                    showComment: true,
                    showRating: true,
                })
            );

            // 渲染已购买
            $("#boughtCount").text(BOOKS.bought.length);
            $("#boughtBookList").html(
                renderBookList(BOOKS.bought, {
                    showComment: false,
                    showRating: false,
                    showReadDate: false
                })
            );

            // 渲染计划购买
            $("#purchaseCount").text(BOOKS.purchase.length);
            $("#purchaseBookList").html(
                renderBookList(BOOKS.purchase, {
                    showComment: false,
                    showRating: false,
                    showReadDate: false
                })
            );

            // 点击媒介按钮
            var $mediaOptions = $("#readMediaOptions .option");
            var $pageOptions = $("#readPagesOptions");
            var $wordsOptions = $("#readWordsOptions");
            $mediaOptions.on("click", function () {
                var media = $(this).text();
                if (media === "all") {
                    $pageOptions.hide();
                    $wordsOptions.hide();
                } else if (media === "纸质书") {
                    $pageOptions.show();
                    $wordsOptions.hide();
                } else if (media === "电子书") {
                    $pageOptions.hide();
                    $wordsOptions.show();
                }
            });
        });
    });
</script>
