<!DOCTYPE html>
<html>

<head>
    <title>我读的书</title>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Language" content="zh-cn">
    <script src="./resources/js/jquery-3.6.0.min.js" charset="UTF-8"></script>
    <script src="./resources/js/main.js" charset="UTF-8"></script>
    <script src="./resources/js/bookUtils.js" charset="UTF-8"></script>
    <script src="./resources/js/button.js" charset="UTF-8"></script>
    <link rel="stylesheet" href="./resources/css/main.css">
</head>

<body>
    <!-- 在读书架 -->
    <div class="bookCollection media-all pagesRange-all" id="readingBooks">
        <h1>在读 <span class="count" id="readingCount"></span></h1>
        <!-- 书籍列表渲染占位 -->
        <div id="readingBookList"></div>
    </div>

    <!-- 已购买书架 -->
    <div class="bookCollection media-all pagesRange-all" id="boughtBooks">
        <h1>已购买 <span class="count" id="boughtCount"></span></h1>
        <!-- 媒介按钮占位 -->
        <div class="options media" id="boughtMediaOptions"></div>
        <!-- 页数范围按钮占位 -->
        <div class="options pagesRange" id="boughtPagesOptions"></div>
        <!-- 书籍列表渲染占位 -->
        <div id="boughtBookList"></div>
    </div>

</body>
<script>
    $(function () {
        // 读取书籍数据
        $.get("./resources/markdown/books.md", function (md) {
            var BOOKS = parseMarkdownTable(md);

            // 全局书籍对象映射 DOM id -> 数组
            window.BOOK_COLLECTIONS = {
                readingBooks: BOOKS.reading,
                boughtBooks: BOOKS.bought,
                readingHistory: BOOKS.read,
                suspendedBooks: BOOKS.suspended,
                purchaseBooks: BOOKS.purchase
            };

            // 更新在读数量
            $("#readingCount").text(BOOKS.reading.length);

            // 渲染在读书架
            $("#readingBookList").html(
                renderBookList(BOOKS.reading, {
                    showPagesOrWords: null,
                    showPublisher: true,
                    showISBN: true,
                    showImage: true,
                    showMedia: true,
                    order: "ReadYearAndRating"
                })
            );

            // 更新已购买数量
            $("#boughtCount").text(BOOKS.bought.length);

            // 渲染已购买书架的媒介按钮
            $("#boughtMediaOptions").empty(); 
            ["all", "纸质书", "电子书"].forEach(function (media) {
                var $btn = renderMediaOptionButton(media, BOOKS.bought, "boughtBooks");
                if ($btn) $("#boughtMediaOptions").append($btn);
            });

            // 渲染已购买书架的页数范围按钮
            $("#boughtPagesOptions").empty(); 
            ["all", "未知", "200页以下", "200到500页", "500到1000页", "1000页以上"].forEach(function (range) {
                var $btn = renderPagesRangeOptionButton(range, BOOKS.bought, "boughtBooks");
                if ($btn) $("#boughtPagesOptions").append($btn);
            });

            // 渲染已购买书籍列表
            $("#boughtBookList").html(
                renderBookList(BOOKS.bought, {
                    showPagesOrWords: true,
                    showPublisher: true,
                    showISBN: true,
                    showImage: true,
                    showMedia: true,
                    order: "ReadYearAndRating"
                })
            );
        });
    });
</script>

</html>
